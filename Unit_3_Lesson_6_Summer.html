                title: "Type 1 Question 1", type: "mc", assetType: "none",

                prompt: "Select the correct total value (rounded to 2 decimal places):",
                options: ["A) \\(\\$11\\,561.83\\)", "B) \\(\\$10\\,000.00\\)", "C) \\(\\$12\\,144.52\\)", "D) \\(\\$11\\,180.22\\)"],
                hint: "Use the Future Value of an Annuity formula: \\(FV = R \\times \\dfrac{(1 + i)^n - 1}{i}\\). Find quarterly rate i and total periods n first.",
                steps: [
                    { title: "Step 1: Extract Given Financial Parameters", math: "\\(R = 500, \\quad i = \\dfrac{0.06}{4} = 0.015, \\quad n = 5 \\times 4 = 20\\)", explanation: "Identify regular payment R, periodic interest rate i, and total number of compounding periods n." },
                    { title: "Step 2: Substitute Parameters Into FV Formula", math: "\\(FV = 500 \\times \\dfrac{(1 + 0.015)^{20} - 1}{0.015}\\)", explanation: "Inject the extracted variables into the ordinary simple annuity future value algebraic template." },
                    { title: "Step 3: Evaluate Exponent Component Layer", math: "\\((1.015)^{20} \\approx 1.346855\\)", explanation: "Compute the exponential compounding growth base scalar factor using a calculator." },
                    { title: "Step 4: Execute Final Algebraic Simplification", math: "\\(FV = 500 \\times \\dfrac{0.346855}{0.015} = 500 \\times 23.123667 = 11561.83\\)", explanation: "Perform subtraction, fraction reduction, and final multiplication to round precisely to two decimal places." }
                ], ans: "A"

            u3l6_t1q2: {
                title: "Type 1 Question 2", type: "mc", assetType: "none",
                fullStatement: "A student decides to save \\(\\$150\\) at the end of every month for \\(4\\) years in a high-yield account paying \\(4.8\\%\\)/a interest compounded monthly. What is the total sum accumulated at the end of the term?",
                prompt: "Select the correct accumulated future value:",

                hint: "Determine the monthly compounding metrics before applying the geometric future value annuity expression.",
                steps: [
                    { title: "Step 1: Isolate Periodic System Multipliers", math: "\\(R = 150, \\quad i = \\dfrac{0.048}{12} = 0.004, \\quad n = 4 \\times 12 = 48\\)", explanation: "Obtain the monthly interest rate index and the total multi-period months count." },
                    { title: "Step 2: Setup Future Value Fractional Template", math: "\\(FV = 150 \\times \\dfrac{(1 + 0.004)^{48} - 1}{0.004}\\)", explanation: "Plug variables into the future value simple annuity structure." },
                    { title: "Step 3: Solve Radicand Base Power Multiplier", math: "\\((1.004)^{48} \\approx 1.210985\\)", explanation: "Calculate the base decimal expanded factor level." },
                    { title: "Step 4: Resolve Complete Numeric Quotient String", math: "\\(FV = 150 \\times \\dfrac{0.210985}{0.004} = 150 \\times 52.746211 = 7911.93\\)", explanation: "Execute numerator subtraction, quotient scaling, and establish the final decimal portfolio value." }
                ], ans: "B"
            },
            u3l6_t1q3: {
                title: "Type 1 Question 3", type: "mc", assetType: "none",
                fullStatement: "A parent deposits \\(\\$2\\,000\\) at the end of each calendar year into a trust fund for a child. If the trust fund earns \\(7\\%\\) interest compounded annually, what will be the total value of the fund after \\(10\\) years?",
                prompt: "Select the correct total balance matrix value:",
                options: ["A) \\(\\$20\\,000.00\\)", "B) \\(\\$25\\,114.25\\)", "C) \\(\\$27\\,632.90\\)", "D) \\(\\$29\\,441.80\\)"],
                hint: "Since compounding frequency matches annual payments, interest parameters do not require fractional fraction partitioning.",
                steps: [
                    { title: "Step 1: Extract Annual Constant Values", math: "\\(R = 2000, \\quad i = 0.07, \\quad n = 10\\)", explanation: "Identify simple annual terms directly without converting periodic subdivisions." },
                    { title: "Step 2: Plug Into Annuity Growth Matrix Model", math: "\\(FV = 2000 \\times \\dfrac{(1 + 0.07)^{10} - 1}{0.07}\\)", explanation: "Incorporate variables inside the standard mathematical annuity progression expression." },
                    { title: "Step 3: Evaluate Base Exponent Factor", math: "\\((1.07)^{10} \\approx 1.967151\\)", explanation: "Evaluate the base value 1.07 raised to the power of 10." },
                    { title: "Step 4: Solve Total Balance Value Output", math: "\\(FV = 2000 \\times \\dfrac{0.967151}{0.07} = 2000 \\times 13.816448 = 27632.90\\)", explanation: "Perform calculations to find the final portfolio asset sum." }
                ], ans: "C"

            u3l6_t2q1: {
                title: "Type 2 Question 1", type: "mc", assetType: "none",
                fullStatement: "Over the course of \\(6\\) years, Jasmine makes regular deposits of \\(\\$400\\) every \\(3\\) months into an account that pays \\(5.2\\%\\)/a interest compounded quarterly. Which mathematical formula structure correctly models the future value of this annuity?",
                prompt: "Select the correct algebraic formula setup:",
                options: [

        let globalScore = 0;
        let globalAttempts = 0;
        let questionStates = {};
        
        Object.keys(problemDataPack).forEach(k => {
            questionStates[k] = { answered: false, selectedMcOption: "", isCorrect: false, currentStep: 0, solRevealed: false };
        });

        let activeQuestionId = "";
        let currentStepIndex = 0;
        let visibleStepElements = [];

        function buildOptionsHTML(problem, selectedLetter, disabled) {
            let html = '<div class="mc-options-list">';
            for (let i = 0; i < problem.options.length; i++) {
                const opt = problem.options[i];
                const letter = opt.charAt(0);
                const sel = selectedLetter === letter ? "selected" : "";
                const dis = disabled ? "disabled" : "";
                html += '<div class="mc-option-card ' + sel + ' ' + dis + '" onclick="selectMcOptionCard(\'' + letter + '\')"><span class="mc-badge">' + letter + '</span><span>' + opt.substring(3) + '</span></div>';
            }
            html += '</div>';
            return html;
        }

        function renderMathElements() {
            if (window.renderMathInElement) {
                renderMathInElement(document.body, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '\\(', right: '\\)', display: false}
                    ],
                    throwOnError: false
                });
            }
        }

        window.onload = renderMathElements;

        function displaySolution() {
            const selectMenu = document.getElementById("question-select");
            activeQuestionId = selectMenu.value;

            document.getElementById("solution-reveal-layer").style.display = "none";
            var __hb = document.getElementById("hint-box"); if (__hb) __hb.style.display = "none";
            const placeholder = document.getElementById("placeholder");
            const quizStation = document.getElementById("quiz-station");
            const assetMount = document.getElementById("asset-viewport-mount-point");
            const mountPoint = document.getElementById("dynamic-input-mount-point");
            const promptLabel = document.getElementById("input-prompt-label");

            if (activeQuestionId === "") {
                placeholder.style.display = "block";
                quizStation.style.display = "none";
                assetMount.style.display = "none";
                return;
            }

            placeholder.style.display = "none";
            quizStation.style.display = "block";
            
            const activeProblem = problemDataPack[activeQuestionId];
            const state = questionStates[activeQuestionId];

            document.getElementById("question-statement-display").innerHTML = activeProblem.fullStatement;
            promptLabel.innerHTML = activeProblem.prompt;
            
            mountPoint.innerHTML = buildOptionsHTML(activeProblem, state.selectedMcOption, state.answered);

            if (state.answered) {
                lockQuizInterface(state.isCorrect);
                if (state.solRevealed) revealSolutionWorkspace();
            } else {
                unlockQuizInterface();
            }

            renderMathElements();
        }

        function selectMcOptionCard(letter) {
            if (!activeQuestionId || questionStates[activeQuestionId].answered) return;
            
            questionStates[activeQuestionId].selectedMcOption = letter;
            var __fb = document.getElementById("feedback-msg"); if (__fb) __fb.style.display = "none";
            
            const activeProblem = problemDataPack[activeQuestionId];
            const mountPoint = document.getElementById("dynamic-input-mount-point");
            
            mountPoint.innerHTML = buildOptionsHTML(activeProblem, letter, false);
            renderMathElements();
        }

        function evaluateStudentAnswer() {
            if (!activeQuestionId || questionStates[activeQuestionId].answered) return;

            const firstNameInput = document.getElementById("first-name").value.trim();
            const lastNameInput = document.getElementById("last-name").value.trim();

            if (firstNameInput === "" || lastNameInput === "") {
                alert("Please enter your first and last name first.");
                return;
            }

            const state = questionStates[activeQuestionId];
            if (!state.selectedMcOption) {
                alert("Please choose an answer first.");
                return;
            }

            let matchingCorrect = (state.selectedMcOption === answerRegistry[activeQuestionId]);
            let logString = "Option " + state.selectedMcOption;

            globalAttempts++;
            state.attempts = (state.attempts || 0) + 1;
            if (matchingCorrect && !state.isCorrect) globalScore++;
            state.isCorrect = matchingCorrect;
            updateHudScoreboard();

            if (matchingCorrect) {
                state.answered = true;
                lockQuizInterface(true);
            } else {
                showTryAgain();
            }

            let payload = {
                unitId: "Unit_3",
                lessonId: "U3_Lesson_6",
                firstName: firstNameInput,
                lastName: lastNameInput,
                questionId: activeQuestionId,
                userAnswer: logString,
                isCorrect: matchingCorrect,
                attempts: state.attempts,
                methodUsed: "Multiple Choice Selection",
                totalScore: globalScore
            };

            transmitDataToTeacherSpreadsheet(payload);
        }

        function toggleHint() {
            if (!activeQuestionId) return;
            var box = document.getElementById("hint-box");
            if (!box) return;
            if (box.style.display === "block") { box.style.display = "none"; return; }
            var data = problemDataPack[activeQuestionId];
            box.innerHTML = "<strong>Hint:</strong> " + (data.hint || "");
            box.style.display = "block";
            renderMathElements();
        }

        function transmitDataToTeacherSpreadsheet(payload) {
            fetch(TEACHER_SPREADSHEET_SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            }).catch(err => console.error("Database cloud logging failure:", err));
        }

        function showTryAgain() {
            document.getElementById("reveal-sol-btn").disabled = false;
            const feedback = document.getElementById("feedback-msg");
            feedback.style.display = "block";
            feedback.className = "feedback-msg-area feedback-error";
            feedback.innerHTML = "Not quite yet - pick another answer, or tap Hint for a clue. (You can tap Show Solution Steps any time.)";
        }

        function lockQuizInterface(isCorrect) {
            document.querySelectorAll(".mc-option-card").forEach(c => c.classList.add("disabled"));
            document.getElementById("check-ans-btn").disabled = true;
            document.getElementById("reveal-sol-btn").disabled = false;

            const feedback = document.getElementById("feedback-msg");
            feedback.style.display = "block";
            if (isCorrect) {
                feedback.className = "feedback-msg-area feedback-success";
                feedback.innerHTML = "Correct! Nice work.";
            } else {
                feedback.className = "feedback-msg-area feedback-error";
                feedback.innerHTML = "Not quite - review the steps below.";
            }
        }

        function unlockQuizInterface() {
            document.getElementById("check-ans-btn").disabled = false;
            document.getElementById("reveal-sol-btn").disabled = true;
            document.getElementById("feedback-msg").style.display = "none";
        }

        function unlockSolutionPanel() {
            questionStates[activeQuestionId].solRevealed = true;
            revealSolutionWorkspace();
        }

        function revealSolutionWorkspace() {
            const targetDiv = document.getElementById("solution-reveal-layer");
            const workspace = document.getElementById("solution-workspace-injected");
            const data = problemDataPack[activeQuestionId];
            
            let html = `<h2>Solution for ${data.title}</h2>`;
            data.steps.forEach(step => {
                html += `
                <div class="step-block" style="display:none;">
                    <span class="step-title">${step.title}</span>
                    <div class="step-math">${step.math}</div>
                    <span class="step-explanation">${step.explanation}</span>
                </div>`;
            });
            html += `
            <div class="final-answer-box" style="display:none;">
                <span class="final-answer-label">Answer</span>
                <span class="final-answer-math">Correct answer: ${data.ans}</span>
            </div>`;

            workspace.innerHTML = html;
            targetDiv.style.display = "block";
            renderMethodSteps();
            renderMathElements();
        }

        function renderMethodSteps() {
            const activeContainer = document.getElementById("solution-workspace-injected");
            visibleStepElements = Array.from(activeContainer.querySelectorAll('.step-block, .final-answer-box'));
            
            currentStepIndex = questionStates[activeQuestionId].currentStep;
            for (let i = 0; i <= currentStepIndex; i++) {
                if (visibleStepElements[i]) visibleStepElements[i].style.display = "block";
            }

            document.getElementById("restart-btn").disabled = (currentStepIndex === 0);
            document.getElementById("next-btn").disabled = (currentStepIndex === visibleStepElements.length - 1);
        }

        function showNextStep() {
            if (currentStepIndex < visibleStepElements.length - 1) {
                currentStepIndex++;
                questionStates[activeQuestionId].currentStep = currentStepIndex;
                visibleStepElements[currentStepIndex].style.display = "block";
                visibleStepElements[currentStepIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                document.getElementById("restart-btn").disabled = false;
            }
            if (currentStepIndex === visibleStepElements.length - 1) {
                document.getElementById("next-btn").disabled = true;
            }
            renderMathElements();
        }

        function restartSolution() {
            questionStates[activeQuestionId].currentStep = 0;
            revealSolutionWorkspace();
        }

        function updateHudScoreboard() {
            document.getElementById("hud-score").innerText = globalScore;
            document.getElementById("hud-attempts").innerText = globalAttempts;
        }
    </script>
